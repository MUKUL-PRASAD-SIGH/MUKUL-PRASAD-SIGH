name: Update GitHub Profile Assets

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:

concurrency:
  group: github-actions
  cancel-in-progress: true

jobs:
  update-assets:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}   # use PAT so commits are attributed to you
          fetch-depth: 0

      - name: Create assets directory
        run: mkdir -p assets

      - name: Fetch GitHub Stats
        continue-on-error: true
        run: |
          # NOTE: include_all_commits causes "Could not fetch total commits" on public Vercel — removed
          curl --retry 3 --retry-delay 5 -L \
            "https://github-readme-stats.vercel.app/api?username=MUKUL-PRASAD-SIGH&show_icons=true&theme=radical&count_private=true&hide_border=true&rank_icon=github" \
            -o assets/github-stats.svg || echo "Failed to fetch GitHub stats"

      - name: Fetch Top Languages
        continue-on-error: true
        run: |
          # Excluding Python-heavy AI/ML repos so other languages show up properly.
          # These repos have massive Python codebases that skew to 96%+ Python.
          curl --retry 3 --retry-delay 5 -L \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=MUKUL-PRASAD-SIGH&layout=compact&theme=radical&langs_count=10&hide_border=true&exclude_repo=KisaanMitra,NovaPulse,NEURACITY,X-FORECAST,GlamGlow,HealthCare-System-Dashboard,URBAN-PLANNING,DonorConnectT,VoOTEX,finance-bud,Clipbait" \
            -o assets/top-langs.svg || echo "Failed to fetch top languages"

      - name: Fetch GitHub Streak
        continue-on-error: true
        run: |
          TIMESTAMP=$(date +%s)
          curl --retry 3 --retry-delay 5 -L \
            "https://streak-stats.demolab.com?user=MUKUL-PRASAD-SIGH&theme=radical&hide_border=true&date_format=M%20j%5B%2C%20Y%5D&ring=FE428E&fire=F8D847&currStreakLabel=F8D847&t=${TIMESTAMP}" \
            -o assets/streak.svg || echo "Failed to fetch streak stats"

      - name: Fetch Contribution Graph
        continue-on-error: true
        run: |
          curl --retry 3 --retry-delay 5 -L \
            "https://ghchart.rshah.org/MUKUL-PRASAD-SIGH" \
            -o assets/ghchart.svg || echo "Failed to fetch contribution graph"

      - name: Generate Profile Trophies
        continue-on-error: true
        uses: ryo-ma/github-profile-trophy@v1
        with:
          username: MUKUL-PRASAD-SIGH
          theme: radical
          no-frame: true
          column: 7
          margin-w: 4
          output-path: assets/trophy.svg

      - name: Generate 3D Contribution Calendar
        continue-on-error: true
        uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          USERNAME: MUKUL-PRASAD-SIGH
          BACKGROUND_COLOR: "#141321"
          TIME_ZONE: "Asia/Kolkata"
        with:
          outputDir: assets

      - name: Generate Contribution Snake
        uses: Platane/snk@v3
        with:
          github_user_name: MUKUL-PRASAD-SIGH
          outputs: |
            assets/snake.svg
            assets/snake-dark.svg?palette=github-dark

      # ─── Pulse: write a live timestamp into README so there's ALWAYS a diff ───
      - name: Update Live Pulse in README
        run: |
          NOW=$(date -u "+%Y-%m-%d %H:%M UTC")
          DAY=$(date -u "+%A")
          RUN_NUM=${{ github.run_number }}
          PULSE_BLOCK="<!-- PULSE_START -->
          > 🤖 **Auto-synced** · Last refreshed: \`${NOW}\` (${DAY}) · Run #${RUN_NUM}
          <!-- PULSE_END -->"

          # Replace between markers (or append if missing)
          if grep -q "<!-- PULSE_START -->" README.md; then
            perl -i -0pe 's|<!-- PULSE_START -->.*?<!-- PULSE_END -->|'"${PULSE_BLOCK}"'|s' README.md
          else
            echo "" >> README.md
            echo "${PULSE_BLOCK}" >> README.md
          fi

      # ─── Commit as YOU so it shows on your contribution graph ───────────────
      - name: Commit and push (counts as your contribution)
        run: |
          # Author = your real identity → GitHub counts this in your graph ✅
          git config user.name "Mukul Prasad"
          git config user.email "mukulprasad958@gmail.com"

          git add assets/ README.md

          # If genuinely nothing changed, skip (shouldn't happen — pulse always differs)
          git diff --cached --quiet && echo "Nothing changed, skipping." && exit 0

          NOW=$(date -u "+%Y-%m-%d %H:%M UTC")
          git commit -m "🔄 profile sync · ${NOW}"

          git pull --rebase origin main || true
          git push origin main
